<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto 1 - Sites Martin</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            text-align:center;
        }

        header{
            background:#111;
            padding:20px;
            font-size:32px;
            font-weight:bold;
        }

        h2{
            margin-top:40px;
        }

        .container{
            margin-top:40px;
        }

        .btn{
            display:block;
            width:260px;
            margin:15px auto;
            padding:15px;
            text-decoration:none;
            color:white;
            background:#0078ff;
            border-radius:10px;
            font-size:20px;
            transition:.3s;
        }

        .btn:hover{
            background:#005fcc;
            transform:scale(1.05);
        }

        footer{
            margin-top:60px;
            padding:20px;
            background:#111;
        }
    </style>
</head>
<body>

<header>
    Projeto 1
</header>

<h2>Sites Martin</h2>

<div class="container">

    <a class="btn" href="https://chatgpt.com" target="_blank">
        ChatGPT
    </a>

    <a class="btn" href="https://youtube.com" target="_blank">
        YouTube
    </a>

    <a class="btn" href="https://kirka.io" target="_blank">
        Kirka.io
    </a>

    <a class="btn" href="https://roblox.com" target="_blank">
        Roblox
    </a>

</div>

<footer>
    © 2026 - Sites João Martin
</footer>

</body>
</html>
